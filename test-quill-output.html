<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Quill Output</title>
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #editor-container { height: 300px; border: 1px solid #ccc; margin-bottom: 20px; }
    #output { background: #f5f5f5; padding: 15px; border: 1px solid #ddd; white-space: pre-wrap; }
    .preview { border: 2px solid #4CAF50; padding: 15px; margin-top: 20px; }
    .preview h3 { margin-top: 0; color: #4CAF50; }
  </style>
</head>
<body>
  <h1>Test Quill - Vérification du HTML généré</h1>
  
  <h2>Éditeur Quill:</h2>
  <div id="editor-container"></div>
  
  <button onclick="showOutput()">Voir le HTML généré</button>
  <button onclick="showPreview()">Prévisualiser</button>
  
  <h2>HTML brut (innerHTML):</h2>
  <div id="output"></div>
  
  <div id="preview-container"></div>

  <script>
    // Initialiser Quill
    const quill = new Quill('#editor-container', {
      theme: 'snow',
      placeholder: 'Tapez votre texte ici avec des emojis et des sauts de ligne...'
    });

    // Pré-remplir avec un exemple similaire à votre screenshot
    quill.clipboard.dangerouslyPasteHTML(`
      <h2>📘 Chapitre 2 : Premiers pas avec React JS</h2>
      <p>🎯 Objectif du chapitre</p>
      <p>✅ Comprendre les bases de React</p>
      <p>✅ Créer une première application React</p>
      <p>✅ Manipuler composants, JSX et affichage</p>
    `);

    function showOutput() {
      const html = quill.root.innerHTML;
      document.getElementById('output').textContent = html;
      console.log('HTML généré:', html);
    }

    function showPreview() {
      const html = quill.root.innerHTML;
      const container = document.getElementById('preview-container');
      container.innerHTML = `
        <div class="preview">
          <h3>Prévisualisation (comme dans course-watch):</h3>
          <div class="article-content" style="white-space: pre-wrap; word-wrap: break-word;">
            ${html}
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
