<section class="course-category">
  <div class="container">
    <h2 class="mb-1">Nos catégories de cours</h2>
    <p>Trouvez le domaine qui vous passionne et commencez dès aujourd'hui.</p>

    <div *ngIf="loading" class="cc-loading text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 mb-0 text-muted">Chargement des catégories...</p>
    </div>

    <div *ngIf="!loading && categories.length === 0" class="cc-empty text-center py-5">
      <i class="fa-solid fa-compass"></i>
      <p class="mb-0 mt-2">Aucune catégorie disponible pour le moment.</p>
    </div>

    <div class="row" *ngIf="!loading && categories.length > 0">
      <div class="col-lg-4 col-md-6" *ngFor="let cat of categories">
        <a [routerLink]="cat.courseCount > 0 ? routes.courseListPublic : null"
           [queryParams]="cat.courseCount > 0 ? { categoryId: cat.id } : null"
           [attr.aria-disabled]="cat.courseCount === 0"
           class="course-category-item cc-card-link"
           [class.cc-disabled]="cat.courseCount === 0">
          <div class="d-flex flex-row justify-content-between align-items-center">
            <div class="d-flex align-items-center cc-link-wrap">
              <span class="cc-icon-wrap" [ngClass]="getCategoryColorClass(cat.name)">
                <i [class]="getCategoryIconClass(cat.icon, cat.name)"></i>
              </span>
              <h6 class="pe-2 mb-0">{{ cat.name }}</h6>
            </div>
            <span class="cat-count text-white fw-medium bg-dark d-inline-flex">
              {{ cat.courseCount }}
            </span>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>
