<div class="notif-settings">
    <div class="notif-block">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <h5 class="fs-18 mb-0">Notifications dans l'application</h5>
            <button class="btn btn-sm btn-dark" type="button" (click)="toggleAll('general')">Tout basculer</button>
        </div>

        @for (item of generalPreferences; track item.key) {
            <div class="d-flex justify-content-between align-items-center mb-3 notif-item">
                <div>
                    <h6 class="mb-1">{{ item.title }}</h6>
                    <small class="text-muted">{{ item.description }}</small>
                </div>
                <div class="form-check form-switch form-check-md mb-0 ms-3">
                    <input class="form-check-input" type="checkbox" [(ngModel)]="item.enabled" [name]="item.key">
                </div>
            </div>
        }
    </div>

    <div class="notif-block mt-4">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <h5 class="fs-18 mb-0">Notifications par e-mail</h5>
            <button class="btn btn-sm btn-dark" type="button" (click)="toggleAll('email')">Tout basculer</button>
        </div>

        @for (item of emailPreferences; track item.key) {
            <div class="d-flex justify-content-between align-items-center mb-3 notif-item">
                <div>
                    <h6 class="mb-1">{{ item.title }}</h6>
                    <small class="text-muted">{{ item.description }}</small>
                </div>
                <div class="form-check form-switch form-check-md mb-0 ms-3">
                    <input class="form-check-input" type="checkbox" [(ngModel)]="item.enabled" [name]="item.key">
                </div>
            </div>
        }
    </div>

    <div class="d-flex align-items-center gap-2 mt-4">
        <button class="btn btn-secondary" type="button" (click)="savePreferences()" [disabled]="saving">
            @if (saving) {
                <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Enregistrer les preferences
        </button>
        @if (saveSuccess) {
            <span class="text-success small fw-semibold">{{ saveSuccess }}</span>
        }
    </div>
</div>
