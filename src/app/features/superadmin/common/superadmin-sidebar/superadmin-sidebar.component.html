<!-- ══════════════════════════════════════════════════════
     SuperAdmin Sidebar  —  Dreams LMS Design System
     Amber #FF9500 | Deep Purple #2d1060
     ══════════════════════════════════════════════════════ -->
<nav class="sa-sidebar">

  <!-- ── PROFILE CARD ───────────────────────────────────── -->
  <div class="sa-profile-card">
    <div class="sa-profile-glow"></div>
    <div class="d-flex align-items-center gap-3 position-relative">
      <div class="sa-av-wrap">
        <div class="sa-av-outer-ring"></div>
        <div class="sa-av-border"></div>
        <div class="sa-av-circle">
          <span class="sa-av-initial">{{ userInitials }}</span>
        </div>
        <div class="sa-av-crown-badge"><i class="ti ti-shield-bolt"></i></div>
        <div class="sa-av-pulse"></div>
      </div>
      <div class="overflow-hidden">
        <p class="mb-0 fw-bold text-truncate" style="max-width:140px;font-size:14px;color:#1e293b">{{ userName }}</p>
        <span class="sa-role-badge"><i class="ti ti-shield-star me-1" style="font-size:9px"></i>Super Administrateur</span>
      </div>
    </div>
  </div>

  <!-- ── MENU PRINCIPAL ─────────────────────────────────── -->
  <div class="sa-nav-section">
    <span class="sa-nav-label">Menu Principal</span>
    <ul class="sa-nav-list">
      <li>
        <a [routerLink]="routes.superadmin_dashboard" routerLinkActive="sa-active" class="sa-nav-item">
          <span class="sa-nav-ico sa-ico-primary"><i class="ti ti-layout-dashboard"></i></span>
          <span class="sa-nav-text">Tableau de bord</span>
        </a>
      </li>
      <li>
        <a [routerLink]="routes.superadmin_users" routerLinkActive="sa-active" class="sa-nav-item">
          <span class="sa-nav-ico sa-ico-indigo"><i class="ti ti-users"></i></span>
          <span class="sa-nav-text">Gestion des Utilisateurs</span>
        </a>
      </li>
      <li>
        <a [routerLink]="routes.superadmin_logs" routerLinkActive="sa-active" class="sa-nav-item">
          <span class="sa-nav-ico sa-ico-purple"><i class="ti ti-file-analytics"></i></span>
          <span class="sa-nav-text">Logs Système</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sa-nav-divider"></div>

  <!-- ── PARAMÈTRES ─────────────────────────────────────── -->
  <div class="sa-nav-section">
    <span class="sa-nav-label">Paramètres</span>
    <ul class="sa-nav-list">
      <li>
        <a [routerLink]="routes.superadminSettings" routerLinkActive="sa-active" class="sa-nav-item">
          <span class="sa-nav-ico sa-ico-amber"><i class="ti ti-user-circle"></i></span>
          <span class="sa-nav-text">Mon Profil</span>
        </a>
      </li>
      <li>
        <a href="javascript:void(0)" (click)="onLogout()" class="sa-nav-item sa-nav-item-danger">
          <span class="sa-nav-ico sa-ico-danger"><i class="ti ti-logout-2"></i></span>
          <span class="sa-nav-text">Déconnexion</span>
        </a>
      </li>
    </ul>
  </div>

</nav>
