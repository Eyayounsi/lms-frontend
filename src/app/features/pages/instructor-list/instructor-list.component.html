<div class="instructor-list">
  <div class="container">
    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>

    <div *ngIf="!loading">
      <div class="row align-items-baseline">
        <div class="col-lg-12">
          <!-- Filter Bar -->
          <div class="showing-list mb-4">
            <div class="row align-items-center">
              <div class="col-lg-4">
                <div class="show-result text-center text-lg-start">
                  <h6 class="fw-medium">{{ filteredInstructors.length }} instructeur(s) trouvé(s)</h6>
                </div>
              </div>
              <div class="col-lg-8">
                <div class="show-filter add-course-info">
                  <div class="d-sm-flex justify-content-center justify-content-lg-end mb-1 mb-lg-0">
                    <div class="view-icons mb-2 mb-sm-0">
                      <a [routerLink]="routes.instructorGrid" class="grid-view"><i class="feather icon-grid"></i></a>
                      <a [routerLink]="routes.instructorList" class="list-view active"><i class="isax isax-task"></i></a>
                    </div>
                    <div class="search-group">
                      <i class="isax isax-search-normal-1"></i>
                      <input type="text" class="form-control" placeholder="Rechercher un instructeur..." [(ngModel)]="searchTerm" (input)="applySearch()">
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- /Filter Bar -->

          <!-- Empty -->
          <div *ngIf="filteredInstructors.length === 0" class="text-center py-5">
            <p class="text-muted fs-16">Aucun instructeur trouvé.</p>
          </div>

          <!-- Instructor List Items -->
          <div *ngFor="let inst of paginatedInstructors" class="instructor-item instructor-item-seven">
            <div class="instructor-img">
              <a [routerLink]="[routes.instructorDetails, inst.id]">
                <img [src]="getAvatarUrl(inst.avatar)" alt="{{ inst.name }}" class="img-fluid">
              </a>
            </div>
            <div class="instructor-content flex-fill">
              <div class="pb-3 border-bottom mb-3">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-1 mb-1">
                  <div>
                    <h6 class="title">
                      <a [routerLink]="[routes.instructorDetails, inst.id]">{{ inst.name }}</a>
                    </h6>
                    <span class="designation">Instructeur</span>
                  </div>
                  <div *ngIf="inst.avgRating">
                    <p class="rating">
                      <i class="fas fa-star me-1"></i>{{ inst.avgRating }} ({{ inst.reviewCount }} avis)
                    </p>
                  </div>
                </div>
              </div>
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div class="d-flex align-items-center flex-wrap gap-y-2 fs-14 counts-details">
                  <span class="d-flex align-items-center me-4">
                    <span class="d-flex align-items-center"><i class="isax isax-book-saved5 fs-16 text-secondary me-2"></i></span>
                    {{ inst.courseCount }} cours
                  </span>
                </div>
                <div class="d-flex align-items-center flex-wrap gap-1">
                  <div *ngFor="let cat of inst.categories" class="badge bg-gray-100 text-dark badge-md fs-10 fw-medium rounded">
                    {{ cat }}
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Pagination -->
          <div *ngIf="totalPages > 1" class="row align-items-center mt-sm-4 mt-md-5 mt-3">
            <div class="col-md-2">
              <p class="pagination-text">Page {{ currentPage }} sur {{ totalPages }}</p>
            </div>
            <div class="col-md-10">
              <ul class="pagination lms-page justify-content-center justify-content-md-end mt-2 mt-md-0">
                <li class="page-item prev" [class.disabled]="currentPage === 1">
                  <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)"><i class="fas fa-angle-left"></i></a>
                </li>
                <li *ngFor="let p of getPageRange()" class="page-item" [class.active]="p === currentPage">
                  <a class="page-link" href="javascript:void(0)" (click)="goToPage(p)">{{ p }}</a>
                </li>
                <li class="page-item next" [class.disabled]="currentPage === totalPages">
                  <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)"><i class="fas fa-angle-right"></i></a>
                </li>
              </ul>
            </div>
          </div>
          <!-- /Pagination -->

        </div>
      </div>
    </div>
  </div>
</div>
