<div class="content">
  <div class="container">
    <div class="row align-items-start row-gap-4">

      <!-- SIDEBAR -->
      <div class="col-lg-3 student-sidebar-col">
        <app-student-sidebar />
      </div>

      <!-- CONTENT -->
      <div class="col-lg-9 std-content-wrapper">

        <!-- ╔═══════════════════════════════════════════════════════════════════════╗ -->
        <!-- ║ HERO SECTION - Welcome Banner                                       ║ -->
        <!-- ╚═══════════════════════════════════════════════════════════════════════╝ -->
        <div class="std-shell-hero mb-4">
          <div class="std-shell-glow std-shell-glow-1"></div>
          <div class="std-shell-glow std-shell-glow-2"></div>
          <div class="std-shell-hero-inner">
            <div class="row align-items-center w-100">
              <div class="col-lg-8">
                <div class="d-flex align-items-center gap-3">
                  <!-- Avatar uniquement sur le dashboard, sinon juste l'icône -->
                  <ng-container *ngIf="pageTitle === 'Bienvenue'; else iconOnlyHeader">
                    <div class="std-shell-av-wrap position-relative">
                      <div class="std-shell-av-ring"></div>
                      <div class="std-shell-av-border"></div>
                      <div class="std-shell-av-circle">
                        <ng-container *ngIf="userAvatarUrl; else initialsFallback">
                          <img [src]="userAvatarUrl" [alt]="userName" class="std-shell-av-img">
                        </ng-container>
                        <ng-template #initialsFallback>
                          <span class="std-shell-av-initials">{{ userInitials }}</span>
                        </ng-template>
                      </div>
                    </div>
                    <div>
                      <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="std-shell-role-chip"><i class="ti ti-school me-1" style="font-size:9px"></i>Étudiant</span>
                        <span class="std-shell-live"><span class="std-shell-live-dot"></span>Actif</span>
                      </div>
                      <h3 class="std-shell-hero-title mb-0">Bienvenue</h3>
                      <p class="std-shell-hero-subtitle mb-0 mt-1">{{ userName }}</p>
                    </div>
                  </ng-container>
                  <ng-template #iconOnlyHeader>
                    <div class="std-shell-av-wrap">
                      <div class="std-shell-av-ring"></div>
                      <div class="std-shell-av-border"></div>
                      <div class="std-shell-av-circle d-flex align-items-center justify-content-center" style="background: linear-gradient(90deg, #f857a6 0%, #6a82fb 100%);">
                        <i [ngClass]="pageIcon" style="font-size:2.2rem; color: #fff;"></i>
                      </div>
                    </div>
                    <div>
                      <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="std-shell-role-chip"><i class="ti ti-school me-1" style="font-size:9px"></i>Étudiant</span>
                        <span class="std-shell-live"><span class="std-shell-live-dot"></span>Actif</span>
                      </div>
                      <h3 class="std-shell-hero-title mb-0">{{ pageTitle }}</h3>
                    </div>
                  </ng-template>
                </div>
              </div>
              <div class="col-lg-4">
                <div class="d-flex justify-content-lg-end mt-3 mt-lg-0 gap-2 flex-wrap">
                  <a [routerLink]="routes.courseGrid" class="std-shell-action-btn std-shell-action-btn--neutral">
                    <i class="ti ti-search"></i>
                    <span>Parcourir cours</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <router-outlet></router-outlet>
      </div>

    </div>

  </div>
</div>
