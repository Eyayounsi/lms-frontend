<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg" style="max-width: 500px; width: 100%;">
    <div class="card-body p-4 p-md-5">
      <!-- Header -->
      <div class="text-center mb-4">
        <div class="rounded-circle bg-warning bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3"
             style="width: 64px; height: 64px;">
          <i class="ti ti-lock fs-24 text-warning"></i>
        </div>
        <h4 class="fw-bold mb-1">Changement de mot de passe obligatoire</h4>
        <p class="text-muted fs-14">Pour des raisons de sécurité, veuillez définir un nouveau mot de passe lors de votre première connexion.</p>
      </div>

      <!-- Alert messages -->
      <div class="alert alert-danger py-2 fs-13" *ngIf="errorMessage">
        <i class="ti ti-alert-circle me-1"></i>{{ errorMessage }}
      </div>
      <div class="alert alert-success py-2 fs-13" *ngIf="successMessage">
        <i class="ti ti-check me-1"></i>{{ successMessage }}
      </div>

      <!-- Form -->
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Mot de passe actuel</label>
          <div class="input-group">
            <input [type]="showOld ? 'text' : 'password'" class="form-control" 
                   [(ngModel)]="oldPassword" name="oldPassword" placeholder="Entrez votre mot de passe actuel" required>
            <button class="btn btn-outline-secondary" type="button" (click)="showOld = !showOld">
              <i [class]="showOld ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <div class="input-group">
            <input [type]="showNew ? 'text' : 'password'" class="form-control" 
                   [(ngModel)]="newPassword" name="newPassword" placeholder="Minimum 8 caractères" required>
            <button class="btn btn-outline-secondary" type="button" (click)="showNew = !showNew">
              <i [class]="showNew ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Confirmer le nouveau mot de passe</label>
          <div class="input-group">
            <input [type]="showConfirm ? 'text' : 'password'" class="form-control" 
                   [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Retapez le nouveau mot de passe" required>
            <button class="btn btn-outline-secondary" type="button" (click)="showConfirm = !showConfirm">
              <i [class]="showConfirm ? 'ti ti-eye-off' : 'ti ti-eye'"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          <span class="spinner-border spinner-border-sm me-1" *ngIf="loading"></span>
          {{ loading ? 'Modification...' : 'Changer le mot de passe' }}
        </button>
      </form>
    </div>
  </div>
</div>
