<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="description" content="Dreams LMS is a powerful Learning Management System template designed for educators, training institutions, and businesses. Manage courses, track student progress, conduct virtual classes, and enhance e-learning experiences with an intuitive and feature-rich platform.">
		<meta name="keywords" content="LMS template, Learning Management System, e-learning software, online course platform, student management, education portal, virtual classroom, training management system, course tracking, online education">
		<meta name="author" content="Dreams Technologies">
		<meta name="robots" content="index, follow">
		
		<title>Dreams LMS | Advanced Learning Management System Template</title>
  <base href="/">
	<!-- <base href="/angular/template/"> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
  <link rel="icon" type="image/x-icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Quill.js — rich text editor for article lessons -->
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <!-- Prism.js — syntax highlighting for student code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.Prism && window.Prism.plugins && window.Prism.plugins.autoloader) {
        window.Prism.plugins.autoloader.languages_path =
          'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
      }
    });
  </script>

  <style>
    /* ── Quill editor (article editor modal) ───────────────────────────── */
    #quill-editor-container .ql-container { border:none; height:100%; }
    #quill-editor-container .ql-editor {
      height:100%; overflow-y:auto; font-size:15px; line-height:1.85;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      padding:28px 40px; max-width:860px; margin:0 auto;
    }
    #quill-editor-container .ql-editor.ql-blank::before { color:#bbb; font-style:normal; }
    #quill-editor-container .ql-editor h1 { font-size:1.9rem; font-weight:700; margin:1.2em 0 .4em; }
    #quill-editor-container .ql-editor h2 { font-size:1.5rem; font-weight:600; margin:1em 0 .35em; border-bottom:2px solid #f0f0f0; padding-bottom:.25em; }
    #quill-editor-container .ql-editor h3 { font-size:1.2rem; font-weight:600; margin:.9em 0 .3em; }
    #quill-editor-container .ql-editor p  { margin-bottom:.75em; }
    #quill-editor-container .ql-editor blockquote {
      border-left:4px solid #6c63ff; background:#f8f7ff;
      margin:1.2em 0; padding:12px 20px; border-radius:0 6px 6px 0; color:#444; font-style:italic;
    }
    #quill-editor-container .ql-editor pre.ql-syntax {
      background:#1e1e1e; color:#d4d4d4; border-radius:8px;
      font-size:13px; line-height:1.7; padding:18px 20px; margin:1em 0;
      font-family:'Cascadia Code','Fira Code','Courier New',monospace; overflow-x:auto;
    }
    #quill-editor-container .ql-editor a { color:#6c63ff; }
    #quill-editor-container .ql-editor ul, #quill-editor-container .ql-editor ol { padding-left:1.8em; }
    #ql-article-toolbar { background:#fafbfc; border-bottom:1px solid #dee2e6; flex-shrink:0; }
    #ql-article-toolbar .ql-stroke { stroke:#555; }
    #ql-article-toolbar .ql-fill   { fill:#555;   }
    #ql-article-toolbar button:hover .ql-stroke, #ql-article-toolbar button.ql-active .ql-stroke { stroke:#6c63ff; }
    #ql-article-toolbar button:hover .ql-fill,   #ql-article-toolbar button.ql-active .ql-fill   { fill:#6c63ff;   }
    #ql-article-toolbar .ql-picker-label { color:#555; }
    #ql-article-toolbar .ql-picker-item:hover, #ql-article-toolbar .ql-picker-item.ql-selected { color:#6c63ff; }
    /* ── Code block preview (article-preview-body) ──────────────────────── */
    .article-preview-body pre.ql-syntax,
    .article-preview-body pre[class*="language-"] {
      background:#1e1e1e; color:#d4d4d4; border-radius:8px;
      font-size:13px; line-height:1.7; padding:16px 18px; margin:1em 0;
      font-family:'Cascadia Code','Fira Code','Courier New',monospace; overflow-x:auto;
    }
    .article-preview-body .cb-card { border:1px solid #3a3a3a!important; }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
