# HTTP block - non-camera features (backward compat)
server {
    listen 4200;
    server_name localhost;

    client_max_body_size 500M;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass http://backend:8083/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }
    location /uploads/ {
        proxy_pass http://backend:8083/uploads/;
        proxy_set_header Host $host;
    }
    location /ws/detect {
        proxy_pass http://cv-service:5001/ws/detect;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
    location /ws/ {
        proxy_pass http://backend:8083/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
    location /face-api/ {
        proxy_pass http://face-id:8082/;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /face/ {
        proxy_pass http://face-id:8082/face/;
        proxy_set_header Host $host;
    }
    location /agents/ {
        proxy_pass http://chatbot:8090/agents/;
        proxy_set_header Host $host;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS block - REQUIRED for camera/getUserMedia
server {
    listen 4443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 500M;
