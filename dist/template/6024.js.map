<div class="card mb-0">
  <div class="card-body">
    <div class="border-bottom mb-4 pb-4">
      <div class="row">
        <div class="col-md-8">
          <div class="mb-3">
            <h5 class="mb-1 fs-18">Modifier le mot de passe</h5>
            <p class="text-muted mb-0">Choisissez un mot de passe fort et unique pour securiser votre compte.</p>
          </div>
          <form (ngSubmit)="onChangePassword()" #cpForm="ngForm">
            <div class="mb-3 position-relative">
              <label class="form-label">Mot de passe actuel <span class="text-danger">*</span></label>
              <div class="position-relative">
                <input [type]="password[1] ? 'text' : 'password'" class="pass-inputs form-control" [(ngModel)]="oldPassword" name="oldPassword" />
                <span
                  class="isax toggle-password"
                  [ngClass]="password[1] ? 'isax-eye' : 'isax-eye-slash'"
                  (click)="togglePassword(1)"
                  (keydown.enter)="togglePassword(1)"
                  tabindex="0"
                ></span>
              </div>
            </div>
            <div class="mb-3 position-relative">
              <label class="form-label">Nouveau mot de passe <span class="text-danger">*</span></label>
              <div id="passwordInput" class="pass-group">
                <div class="pass-group mb-3">
                  <input
                    [type]="password[0] ? 'text' : 'password'"
                    id="password"
                    class="pass-input form-control form-control-lg"
                    [(ngModel)]="newPassword"
                    name="newPassword"
                    (input)="checkPasswordStrength($event)"
                  />
                  <span
                    class="isax toggle-password fs-14"
                    [ngClass]="password[0] ? 'isax-eye' : 'isax-eye-slash'"
                    (click)="togglePassword(0)"
                    (keydown.enter)="togglePassword(0)"
                    tabindex="0"
                  ></span>
                </div>
                <div
                  id="passwordStrength"
                  class="strength-meter password-strength"
                  [ngClass]="{
                    'poor-active': strengthLevel === 'poor',
                    'avg-active': strengthLevel === 'weak',
                    'strong-active': strengthLevel === 'strong',
                    'heavy-active': strengthLevel === 'heavy'
                  }"
                >
                  <span
                    id="poor"
                    [ngClass]="{
                      active:
                        strengthLevel === 'poor' ||
                        strengthLevel === 'weak' ||
                        strengthLevel === 'strong' ||
                        strengthLevel === 'heavy'
                    }"
                  ></span>
                  <span
                    id="weak"
                    [ngClass]="{ active: strengthLevel === 'weak' || strengthLevel === 'strong' || strengthLevel === 'heavy' }"
                  ></span>
                  <span id="strong" [ngClass]="{ active: strengthLevel === 'strong' || strengthLevel === 'heavy' }"></span>
                  <span id="heavy" [ngClass]="{ active: strengthLevel === 'heavy' }"></span>
                </div>
              </div>
            </div>
            <div class="mb-3 position-relative">
              <label class="form-label">Confirmer le mot de passe <span class="text-danger">*</span></label>
              <div class="position-relative">
                <input [type]="password[2] ? 'text' : 'password'" class="pass-inputs form-control" [(ngModel)]="confirmPassword" name="confirmPassword" />
                <span
                  class="isax toggle-password"
                  [ngClass]="password[2] ? 'isax-eye' : 'isax-eye-slash'"
                  (click)="togglePassword(2)"
                  (keydown.enter)="togglePassword(2)"
                  tabindex="0"
                ></span>
              </div>
            </div>
            <div *ngIf="successMessage" class="alert alert-success mb-2">{{ successMessage }}</div>
            <div *ngIf="errorMessage" class="alert alert-danger mb-2">{{ errorMessage }}</div>
            <div>
              <button class="btn btn-secondary" type="submit">Modifier le mot de passe</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card danger-zone-card mt-4 mb-0">
  <div class="card-body">
    <h5 class="fs-18 mb-2 text-danger">Zone danger</h5>
    <p class="mb-3 text-muted">La suppression est irreversible. Toutes vos donnees seront supprimees.</p>

    <div class="mb-3">
      <label class="form-label">Mot de passe de confirmation <span class="text-danger">*</span></label>
      <input type="password" class="form-control" [(ngModel)]="deletePassword" name="deletePassword" placeholder="Entrez votre mot de passe" />
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-secondary" type="button" (click)="goToProfileSettings()">Retour au profil</button>
      <button class="btn btn-danger" type="button" (click)="onDeleteAccount()" [disabled]="deleting">
        <span *ngIf="deleting" class="spinner-border spinner-border-sm me-2"></span>
        Supprimer mon profil
      </button>
    </div>

    <div class="alert alert-danger mt-3 mb-0" *ngIf="deleteError">{{ deleteError }}</div>
  </div>
</div>
