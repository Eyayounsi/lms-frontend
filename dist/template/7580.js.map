
    <div class="page-title d-flex align-items-center justify-content-between">
        <h5 class="fw-bold">Étudiants</h5>
        <div class="d-flex align-items-center list-icons">
            <a [routerLink]="routes.studentsList" class="active me-2"><i class="isax isax-task"></i></a>
            <a [routerLink]="routes.studentsGrid"><i class="isax isax-element-3"></i></a>
        </div>
    </div>
    <div class="row justify-content-end">
        <div class="col-md-4">
            <div class="input-icon mb-3">
                <span class="input-icon-addon">
                    <i class="isax isax-search-normal-14"></i>
                </span>
                <input  [(ngModel)]="searchDataValue" [ngModelOptions]="{ standalone: true }" type="search" (ngModelChange)="searchData(searchDataValue)" class="form-control form-control-md" placeholder="Rechercher">
            </div>
        </div>
    </div>
    <div class="table-responsive custom-table">
        <table matSort (matSortChange)="sortData($event)" class="table">
            <thead class="thead-light">
                <tr>
                    <th>ID étudiant</th>
                    <th>Nom étudiant</th>
                    <th>Date d'inscription</th>
                    <th>Progression</th>
                    <th>Cours</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                @for (data of tableData;track data){
                <tr>
                    <td><a [routerLink]="['/instructor/students-details', data.studentId]" class="text-primary">{{data.studentId}}</a></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <a [routerLink]="['/instructor/students-details', data.studentId]" class="avatar avatar-md avatar-rounded flex-shrink-0 me-2">
                                @if (hasStudentImage(data)) {
                                    <img [src]="getStudentImage(data)" (error)="onStudentImageError(data)" [alt]="data.studentName || 'Étudiant'">
                                } @else {
                                    <span class="student-avatar-fallback d-inline-flex align-items-center justify-content-center fw-bold" [style.background]="getStudentAvatarGradient(data)">
                                        {{ getStudentInitial(data.studentName) }}
                                    </span>
                                }
                            </a>
                            <a [routerLink]="['/instructor/students-details', data.studentId]"><p class="fs-14">{{data.studentName}}</p></a>
                        </div>
                    </td>
                    <td>{{data.enrollDate}}</td>
                    <td>
                        <span class="badge bg-primary-transparent text-primary">{{data.progress}}</span>
                    </td>
                    <td>{{data.courses}}</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <a [routerLink]="['/instructor/students-details', data.studentId]" class="d-inline-flex fs-14 me-1 action-icon" title="Voir les détails"><i class="isax isax-eye"></i></a>
                            <a [routerLink]="routes.instructorMessage" [queryParams]="{ studentId: data.studentId }" class="d-inline-flex fs-14 action-icon" title="Envoyer un message"><i class="isax isax-messages-3"></i></a>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    <!-- /pagination -->
    <app-custom-pagination/>
    <!-- /pagination -->
