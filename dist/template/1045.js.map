<section class="course-content">
    <div class="container">
        <div class="row align-items-baseline">
            <!-- Sidebar filters (static UI) -->
            <div class="col-lg-3 theiaStickySidebar">
                <div class="filter-clear">
                    <div class="clear-filter d-flex align-items-center justify-content-between mb-4 pb-lg-2">
                        <h5><i class="feather-filter me-2"></i>Filtres</h5>
                    </div>
                    <div class="accordion accordion-customicon1 accordions-items-seperate">
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingOne">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapseOne" aria-expanded="true">
                                    Spécialité <i class="fa-solid fa-chevron-down"></i>
                                </button>
                            </h2>
                            <div id="collapseOne" class="accordion-collapse collapse show">
                                <div class="accordion-body">
                                    <div><label class="custom_check"><input type="checkbox"><span class="checkmark"></span> Développement</label></div>
                                    <div><label class="custom_check"><input type="checkbox"><span class="checkmark"></span> Design</label></div>
                                    <div><label class="custom_check"><input type="checkbox"><span class="checkmark"></span> Marketing</label></div>
                                    <div><label class="custom_check mb-0"><input type="checkbox"><span class="checkmark"></span> Autres</label></div>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingTwo">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapseTwo" aria-expanded="true">
                                    Prix <i class="fa-solid fa-chevron-down"></i>
                                </button>
                            </h2>
                            <div id="collapseTwo" class="accordion-collapse collapse show">
                                <div class="accordion-body">
                                    <div><label class="custom_check custom_one"><input type="checkbox"><span class="checkmark"></span> Tous</label></div>
                                    <div><label class="custom_check custom_one"><input type="checkbox"><span class="checkmark"></span> Gratuit</label></div>
                                    <div><label class="custom_check custom_one mb-0"><input type="checkbox"><span class="checkmark"></span> Payant</label></div>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingThree">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapseThree" aria-expanded="true">
                                    Niveau <i class="fa-solid fa-chevron-down"></i>
                                </button>
                            </h2>
                            <div id="collapseThree" class="accordion-collapse collapse show">
                                <div class="accordion-body">
                                    <div><label class="custom_check custom_one"><input type="checkbox"><span class="checkmark"></span> Débutant</label></div>
                                    <div><label class="custom_check custom_one"><input type="checkbox"><span class="checkmark"></span> Intermédiaire</label></div>
                                    <div><label class="custom_check custom_one mb-0"><input type="checkbox"><span class="checkmark"></span> Avancé</label></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- /Sidebar -->

            <div class="col-lg-9">
                <!-- Loading -->
                <div *ngIf="loading" class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Chargement des instructeurs...</p>
                </div>

                <ng-container *ngIf="!loading">
                    <!-- Toolbar -->
                    <div class="showing-list mb-4">
                        <div class="row align-items-center">
                            <div class="col-lg-4">
                                <div class="show-result text-center text-lg-start">
                                    <h6 class="fw-medium">{{ instructors.length }} instructeur(s)</h6>
                                </div>
                            </div>
                            <div class="col-lg-8">
                                <div class="show-filter add-course-info">
                                    <div class="d-sm-flex justify-content-center justify-content-lg-end mb-1 mb-lg-0">
                                        <div class="view-icons mb-2 mb-sm-0">
                                            <a [routerLink]="routes.instructorGrid" class="grid-view active"><i class="feather icon-grid"></i></a>
                                            <a [routerLink]="routes.instructorList" class="list-view"><i class="isax isax-task"></i></a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- /Toolbar -->

                    <!-- Empty state -->
                    <div *ngIf="instructors.length === 0" class="text-center py-5">
                        <p class="text-muted">Aucun instructeur trouvé.</p>
                    </div>

                    <!-- Instructor cards grid -->
                    <div class="row course-list-cover">
                        <div *ngFor="let instructor of paginatedInstructors"
                             class="col-xl-4 col-md-6 d-flex">
                            <div class="instructor-item instructor-item-six flex-fill">
                                <div class="instructors-img">
                                    <a [routerLink]="[routes.instructorDetails, instructor.id]"
                                       tabindex="0">
                                        <img class="img-fluid" [src]="getAvatarUrl(instructor.avatar)"
                                             [alt]="instructor.name"
                                             style="width:100%;height:220px;object-fit:cover;">
                                    </a>
                                    <div class="position-absolute start-0 top-0 d-flex align-items-start w-100 z-index-2 p-2">
                                        <a href="javascript:void(0);" class="favourite ms-auto" tabindex="0">
                                            <i class="isax isax-heart"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="instructor-content">
                                    <div>
                                        <p class="rating mb-2">
                                            <i class="fas fa-star me-1"></i>{{ instructor.avgRating }}
                                        </p>
                                        <h3 class="title mb-2">
                                            <a [routerLink]="[routes.instructorDetails, instructor.id]">
                                                {{ instructor.name }}
                                            </a>
                                        </h3>
                                        <span class="designation">{{ instructor.courseCount }} cours</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center instructor-bottom">
                                        <div class="d-flex align-items-center">
                                            <span class="d-flex align-items-center">
                                                <i class="isax isax-book-saved5 fs-16 text-secondary me-2"></i>
                                                {{ instructor.courseCount }} cours
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- /Instructor cards -->

                    <!-- Pagination -->
                    <div *ngIf="totalPages > 1" class="row align-items-center">
                        <div class="col-md-2">
                            <p class="pagination-text">Page {{ currentPage }} / {{ totalPages }}</p>
                        </div>
                        <div class="col-md-10">
                            <ul class="pagination lms-page justify-content-center justify-content-md-end mt-2 mt-md-0">
                                <li class="page-item prev" [class.disabled]="currentPage === 1">
                                    <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)">
                                        <i class="fas fa-angle-left"></i>
                                    </a>
                                </li>
                                <ng-container *ngFor="let p of getPageRange()">
                                    <li class="page-item" [class.active]="p === currentPage">
                                        <a class="page-link" href="javascript:void(0)" (click)="goToPage(p)">{{ p }}</a>
                                    </li>
                                </ng-container>
                                <li class="page-item next" [class.disabled]="currentPage === totalPages">
                                    <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)">
                                        <i class="fas fa-angle-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <!-- /Pagination -->
                </ng-container>
            </div>
        </div>
    </div>
</section>
